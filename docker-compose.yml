version: "3.8"

services:

  mariadb:
    image: mariadb:11
    container_name: ecommerce-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: productdb
      MARIADB_USER: product_user
      MARIADB_PASSWORD: product_pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-service:
    build:
      context: ./src/inventory-service
    container_name: inventory-service
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/v1/inventory/EXT-001"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-service-mariadb:
    build:
      context: ./src/product-service
    container_name: product-service
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: product_user
      DB_PASSWORD: product_pass
      INVENTORY_SERVICE_URL: http://inventory-service:8081
    depends_on:
      mariadb:
        condition: service_healthy
      inventory-service:
        condition: service_started

volumes:
  mariadb-data:
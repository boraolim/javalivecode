spring:
  datasource:
    url: jdbc:h2:mem:testdb;INIT=CREATE SCHEMA IF NOT EXISTS LIVERLIVECODE;MODE=MariaDB;DATABASE_TO_UPPER=false
    username: sa
    password: sa
    driverClassName: org.h2.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: none

  sql:
    init:
      #mode: never
      mode: always
      schema-locations: classpath:schema.sql

soap:
  calculator:
    wsdl: http://localhost:8089/ws/calculator.wsdl

# Async Task
queue:
  capacity: 10
pool:
  size: 5
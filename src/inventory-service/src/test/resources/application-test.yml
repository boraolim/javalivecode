spring:
  datasource:
    url: jdbc:h2:mem:testdb;INIT=CREATE SCHEMA IF NOT EXISTS LIVERLIVECODE;MODE=MariaDB;DATABASE_TO_UPPER=false
    username: sa
    password: sa
    driverClassName: org.h2.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      #ddl-auto: update
      #ddl-auto: create-drop
      ddl-auto: none
      #naming:
      #  implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
      #  physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  
  # 🌟 NUEVA PROPIEDAD: Evita que Spring busque y ejecute "schema.sql" de forma automática
  sql:
    init:
      #mode: never
      mode: always
      schema-locations: classpath:schema.sql

# Async Task
queue:
  capacity: 10
pool:
  size: 5